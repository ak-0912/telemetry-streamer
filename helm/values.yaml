replicaCount: 1

fullnameOverride: telemetry-streamer

image:
  repository: telemetry-streamer
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env:
  probeAddr: ":8080"
  streamWorkers: "1"
  shardTotal: "1"
  shardIndex: "0"
  streamIntervalMs: "50"
  mqTopic: "gpu-telemetry"
  mqKeyStrategy: "gpu_id"
  mqKeyStatic: ""
  # gRPC address for MessageQueueService (must match your MQ Service name, namespace, and gRPC port).
  queueServiceURL: "grpc://telemetry-message-queue.telemetry.svc.cluster.local:50051"
  queueCapacity: "1024"
  queueHighWatermark: "0.80"
  queueCriticalWatermark: "0.95"
  queueConsumeDelayMs: "75"
  # Path inside the container when using the CSV baked into the image (Dockerfile ENV).
  # When csv.enabled is true, CSV_PATH is instead mountPath/fileName on the PVC.
  csvPath: "/app/dcgm_metrics_20250718_134233.csv"

csv:
  # When enabled, mount an existing PVC that contains the CSV file.
  enabled: false
  mountPath: /config/csv
  fileName: dcgm_metrics_20250718_134233.csv
  # Required when enabled=true.
  existingPvc: ""

probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
