replicaCount: 1

image:
  repository: telemetry-streamer
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env:
  probeAddr: ":8080"
  streamWorkers: "1"
  streamIntervalMs: "50"
  queueServiceURL: "http://queue-service.default.svc.cluster.local:8081"
  queueCapacity: "1024"
  queueHighWatermark: "0.80"
  queueCriticalWatermark: "0.95"
  queueConsumeDelayMs: "75"

probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
