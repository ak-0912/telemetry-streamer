# Ephemeral pod to copy CSV into the PVC. Mount path is /data → file ends up at volume root.
# Helm mounts the same claim at csv.mountPath (/config/csv) so the filename must match csv.fileName.
#
# Usage:
#   kubectl apply -f k8s/pvc.yaml
#   kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/telemetry-csv-pvc --timeout=120s
#   kubectl apply -f k8s/csv-upload-helper-pod.yaml
#   kubectl wait --for=condition=Ready pod/telemetry-csv-upload --timeout=120s
#   kubectl cp ./dcgm_metrics_20250718_134233.csv telemetry-csv-upload:/data/dcgm_metrics_20250718_134233.csv
#   kubectl delete -f k8s/csv-upload-helper-pod.yaml
apiVersion: v1
kind: Pod
metadata:
  name: telemetry-csv-upload
  labels:
    app.kubernetes.io/name: telemetry-streamer
spec:
  containers:
    - name: shell
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: csv-vol
          mountPath: /data
  volumes:
    - name: csv-vol
      persistentVolumeClaim:
        claimName: telemetry-csv-pvc
