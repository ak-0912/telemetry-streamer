syntax = "proto3";

package telemetry.v1;

option go_package = "telemetry-streamer/api;telemetryv1";

// TelemetryMessage is the wire format for a single GPU telemetry sample
// (serialized into MQ PublishRequest.payload by the streamer).
message TelemetryMessage {
  string metric_name = 1;          // DCGM metric name (e.g. "DCGM_FI_DEV_GPU_UTIL").
  string gpu_id = 2;               // Logical GPU index on the host.
  string device = 3;               // PCIe device identifier.
  string uuid = 4;                 // Globally unique GPU identifier (NVIDIA UUID).
  string model_name = 5;           // GPU model (e.g. "Tesla T4").
  string host_name = 6;            // Hostname of the reporting machine.
  double value = 7;                // Metric sample value.
  string labels_raw = 8;           // Original Prometheus-style label string, preserved verbatim.
  // Canonical telemetry timestamp: nanoseconds since Unix epoch when this log was processed by the streamer.
  int64 processed_at_unix_nano = 9;
}
